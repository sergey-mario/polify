name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_run:
    # Commits made by github-actions[bot] (refresh-daily.yml, update-content.yml) use the
    # default GITHUB_TOKEN, which GitHub excludes from triggering `push` events on other
    # workflows. Falling back to workflow_run so those commits still get deployed.
    workflows: ['Refresh daily practice', 'Update content']
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # No explicit ref: for workflow_run this checks out the default branch's
          # current tip, which already includes the bot commit made during that run
          # (workflow_run.head_sha is the commit that TRIGGERED the run, not commits
          # it created afterward — pinning to it deployed one commit behind).
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
