name: Refresh daily practice

on:
  schedule:
    # 06:00 CEST (UTC+2). Fixed UTC offset, so this runs at 07:00 local during
    # CET (winter) since GitHub Actions cron doesn't follow DST.
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-content
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Reshuffle dailyPractice
        run: npm run refresh-daily

      - name: Commit updated content.json
        run: |
          if [[ -n "$(git status --porcelain public/data/content.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/content.json
            git commit -m "chore: refresh daily practice $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No content changes."
          fi
