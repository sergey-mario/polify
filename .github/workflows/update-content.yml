name: Update content

on:
  schedule:
    # Every day at 06:00 UTC. Adjust to taste.
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-content
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate content.json
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GOOGLE_SHEETS_CSV_URL: ${{ vars.GOOGLE_SHEETS_CSV_URL || secrets.GOOGLE_SHEETS_CSV_URL }}
        run: npm run update-content

      - name: Commit updated content.json
        run: |
          if [[ -n "$(git status --porcelain public/data/content.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/content.json
            git commit -m "chore: update daily content $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No content changes."
          fi
